<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>PDA - {% block title %}Dashboard{% endblock %}</title>
    
    <!-- Fuentes y Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- Tailwind CSS (CDN para beta) -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
    tailwind.config={
        darkMode:"class",
        theme:{
            extend:{
                colors:{
                    "primary":"#4cd7f6",
                    "surface-container-low":"#171d1e",
                    "surface-container":"#1b2122",
                    "surface-variant":"#303638",
                    "outline":"#869397",
                    "outline-variant":"#3d494c",
                    "primary-container":"#06b6d4",
                    "on-surface-variant":"#bcc9cd",
                    "surface-container-highest":"#303638",
                    "surface":"#0e1416",
                    "on-surface":"#dee3e6",
                    "on-background":"#dee3e6",
                    "surface-container-lowest":"#090f11",
                    "secondary":"#adc6ff",
                    "on-primary":"#003640",
                    "surface-container-high":"#252b2d",
                    "primary-fixed":"#acedff",
                    "error":"#ffb4ab",
                    "background":"#0e1416",
                    "tertiary":"#ffb873"
                },
                spacing:{"container-padding":"24px","gutter":"16px","margin-lg":"24px"},
                fontFamily:{"headline-md":["Inter"],"headline-lg":["Inter"],"body-md":["Inter"],"label-md":["Inter"],"headline-sm":["Inter"],"code-md":["monospace"]}
            }
        }
    }
    </script>
    <style>
        body{font-family:'Inter',sans-serif}
        .chart-grid{stroke:#334155;stroke-dasharray:4;stroke-opacity:.5}
        .chart-axis{stroke:#869397;stroke-width:1}
        .chart-text{fill:#869397;font-size:12px}
        /* Utilerías Custom */
        .glass-overlay { background-color: rgba(51, 65, 85, 0.9); backdrop-filter: blur(20px); }
        .input-focus-ring:focus-within { border-color: #06b6d4; box-shadow: 0 0 0 2px rgba(6, 182, 212, 0.2); }
        .zebra-table tbody tr:nth-child(odd) { background-color: var(--tw-colors-surface-container); }
        .zebra-table tbody tr:nth-child(even) { background-color: var(--tw-colors-surface-container-low); }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="bg-background text-on-background font-body-md flex min-h-screen overflow-x-hidden">

    <!-- Sidebar Navegación -->
    <nav class="bg-surface-container-low border-r border-outline-variant w-[260px] h-screen fixed left-0 top-0 flex flex-col py-margin-lg z-40 hidden md:flex">
        <div class="px-6 mb-8 flex items-center gap-3">
            <div class="w-10 h-10 bg-primary/20 rounded-lg flex items-center justify-center border border-primary/30 shrink-0">
                <span class="material-symbols-outlined text-primary text-[24px]">analytics</span>
            </div>
            <div class="flex flex-col">
                <p class="text-[10px] text-on-surface-variant uppercase tracking-wider leading-tight">Proyecto</p>
                <h1 class="font-bold text-primary text-xl leading-tight">APCD</h1>
            </div>
        </div>
        
        <div class="flex-1 flex flex-col gap-1 px-2">
            <a href="/" class="flex items-center gap-3 px-4 py-3 rounded-r-lg group cursor-pointer transition-all {% if active_tab == 'overview' %}bg-primary/10 border-l-4 border-primary text-white font-bold{% else %}text-on-surface-variant hover:bg-surface-variant/50 hover:bg-primary/10 hover:text-primary{% endif %}">
                <span class="material-symbols-outlined text-[20px] {% if active_tab == 'overview' %}text-primary{% endif %}">dashboard</span>
                <span>Overview</span>
            </a>
            <a href="/databases" class="flex items-center gap-3 px-4 py-3 rounded-r-lg group cursor-pointer transition-all {% if active_tab == 'databases' %}bg-primary/10 border-l-4 border-primary text-white font-bold{% else %}text-on-surface-variant hover:bg-surface-variant/50 hover:bg-primary/10 hover:text-primary{% endif %}">
                <span class="material-symbols-outlined text-[20px] {% if active_tab == 'databases' %}text-primary{% endif %}">database</span>
                <span>Databases</span>
            </a>
            <a href="/pipelines" class="flex items-center gap-3 px-4 py-3 rounded-r-lg group cursor-pointer transition-all {% if active_tab == 'pipelines' %}bg-primary/10 border-l-4 border-primary text-white font-bold{% else %}text-on-surface-variant hover:bg-surface-variant/50 hover:bg-primary/10 hover:text-primary{% endif %}">
                <span class="material-symbols-outlined text-[20px] {% if active_tab == 'pipelines' %}text-primary{% endif %}">account_tree</span>
                <span>Pipelines</span>
            </a>
            <!-- El enlace a SQL Editor fue removido temporalmente por solicitud -->
            <a href="/statistics" class="flex items-center gap-3 px-4 py-3 rounded-r-lg group cursor-pointer transition-all {% if active_tab == 'statistics' %}bg-primary/10 border-l-4 border-primary text-white font-bold{% else %}text-on-surface-variant hover:bg-surface-variant/50 hover:bg-primary/10 hover:text-primary{% endif %}">
                <span class="material-symbols-outlined text-[20px] {% if active_tab == 'statistics' %}text-primary{% endif %}">monitoring</span>
                <span>Statistics</span>
            </a>
            <a href="/web-scraping" class="flex items-center gap-3 px-4 py-3 rounded-r-lg group cursor-pointer transition-all {% if active_tab == 'web-scraping' %}bg-primary/10 border-l-4 border-primary text-white font-bold{% else %}text-on-surface-variant hover:bg-surface-variant/50 hover:bg-primary/10 hover:text-primary{% endif %}">
                <span class="material-symbols-outlined text-[20px] {% if active_tab == 'web-scraping' %}text-primary{% endif %}">public</span>
                <span>Web Scraping</span>
            </a>
        </div>
        
        <!-- Botón Execute Pipeline removido -->
    </nav>

    <!-- Contenido Principal -->
    <div class="md:ml-[260px] flex-1 flex flex-col min-h-screen">
        <!-- Topbar -->
        <header class="bg-surface border-b border-outline-variant docked full-width top-0 sticky z-30 h-16 px-margin-lg flex justify-between items-center shadow-[0_4px_20px_rgba(0,0,0,0.2)]">
            <div class="flex items-center gap-4">
                <!-- Se eliminó el texto encimado -->
            </div>
            <div class="flex items-center gap-6">
                <!-- Info Chip Dinámico -->
                <div class="hidden md:flex items-center gap-2 bg-surface-container-high px-3 py-1.5 rounded-full border border-outline-variant">
                    <span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
                    <span id="sources-count-badge" class="font-label-md text-label-md text-on-surface-variant">Sources: 0</span>
                </div>
                <!-- Se eliminaron los iconos de notificaciones y usuario -->
            </div>
        </header>
        
        <!-- Canvas Específico de cada pantalla -->
        {% block content %}{% endblock %}
        
    </div>

    <!-- Script Principal -->
    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
